name: CI/CD Develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  ci:
    uses: ./.github/workflows/ci-base.yml

  deploy-staging:
    needs: ci
    uses: ./.github/workflows/deploy-vercel.yml
    with:
      environment: preview
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
